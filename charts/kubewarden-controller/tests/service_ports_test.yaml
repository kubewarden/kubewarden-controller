suite: service ports configuration
templates:
  - service.yaml
tests:
  - it: "should use default ports in services"
    set:
      telemetry.metrics: true
    asserts:
      # Webhook service (documentIndex 1)
      - equal:
          path: spec.ports[0].port
          value: 443
        documentIndex: 1
      - equal:
          path: spec.ports[0].targetPort
          value: 9443
        documentIndex: 1
      # Metrics service (documentIndex 0) - single metrics port
      - equal:
          path: spec.ports[0].name
          value: metrics
        documentIndex: 0
      - equal:
          path: spec.ports[0].port
          value: 8080
        documentIndex: 0
      - equal:
          path: spec.ports[0].targetPort
          value: 8088
        documentIndex: 0

  - it: "should use custom webhook port in webhook service"
    set:
      ports.webhook: 10443
      telemetry.metrics: true
    asserts:
      # Webhook service
      - equal:
          path: spec.ports[0].targetPort
          value: 10443
        documentIndex: 1

  - it: "should use custom metrics port in metrics service"
    set:
      ports.metrics: 10088
      telemetry.metrics: true
    asserts:
      # Metrics service - metrics port
      - equal:
          path: spec.ports[0].targetPort
          value: 10088
        documentIndex: 0

  - it: "should not render metrics service when telemetry is disabled"
    set:
      telemetry.metrics: false
    asserts:
      # Only the webhook service is rendered
      - hasDocuments:
          count: 1
      - equal:
          path: spec.ports[0].port
          value: 443
        documentIndex: 0
      - equal:
          path: spec.ports[0].targetPort
          value: 9443
        documentIndex: 0
