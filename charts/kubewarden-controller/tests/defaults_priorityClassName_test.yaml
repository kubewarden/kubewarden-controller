suite: priorityClassName configuration
templates:
  - policyserver-default.yaml
tests:
  - it: "should set the priorityClassName when .global.priorityClassName is defined"
    set:
      global:
        priorityClassName: "high-priority"
      policyServer:
        enabled: true
    asserts:
      - equal:
          path: spec.priorityClassName
          value: "high-priority"
